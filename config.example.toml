[hotkey]
key = "F12"
mode = "push_to_talk"

[audio]
device = ""
sample_rate = 16000

[whisper]
model_path = "~/.local/share/murrly/models/ggml-large-v3-turbo.bin"
device = "cuda"
compute_type = "float16"
language = ""
beam_size = 5
initial_prompt = """
Мы обсуждаем программирование и архитектуру: React, TypeScript,
Docker, Kubernetes, microservices, middleware, observability,
PostgreSQL, gRPC, REST, Redis, Kafka, CI/CD, monorepo,
frontend, backend, service mesh.
"""

# Nemotron — второй движок на клавише Break/Pause (только Linux).
# Модель крутится в отдельном Python-сайдкаре (systemd user-сервис
# murrly-nemotron.service), Murrly общается с ним по Unix-сокету.
# F12 остаётся на Whisper и вставляет мгновенно; Nemotron при F12
# считает в фоне, его варианты появляются в Ctrl+F11. Break вставляет
# результат Nemotron.
# ВЫКЛ по умолчанию: сайдкар грузит многогигабайтную модель на GPU.
# Включается из трея («Движок Nemotron»), который стартует службу и
# выставляет этот флаг; вступает в силу после перезапуска Murrly.
[nemotron]
enabled = false
socket_path = ""          # пусто → /run/user/<uid>/murrly-nemotron.sock
lang = "ru-RU"
boost_alpha = 0.5         # вес биасинга терминов (0 = выкл; >0.5 портит обычную речь)

[output]
paste_delay_ms = 80
restore_primary = true
# Mask Russian obscene words (мат) with "•" at display and insertion only;
# the recognized text is always stored/scored uncensored. Toggle live from
# the tray ("Фильтр мата"). On by default.
profanity_filter = true
# Adapt the inserted text to the cursor's surroundings in the focused field
# (capitalisation, leading space, terminal punctuation) — Linux/AT-SPI.
# The tray item "Контекстная вставка" applies the per-app prerequisites.
context_insert = true
